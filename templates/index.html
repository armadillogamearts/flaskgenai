<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Imagens com IA</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>Gerador de Imagens IA</h1>
        
        <form action="/gerar" method="post">
            <input type="text" name="descricao" value="{{ prompt if prompt else '' }}" placeholder="Descreva sua imagem com ruiqueza de detalhes..." required>
            <br>
            <button type="submit">GERAR IMAGEM</button>
        </form>

        {% if erro %}
            <p style="color: red;">{{ erro }}</p>
        {% endif %}

        {% if imagem_b64 %}
            <img class="result-img" src="data:image/png;base64,{{ imagem_b64 }}" id="generatedImage">
            <div style="margin-top: 15px;">
                <!-- Botão Download -->
                <a href="data:image/png;base64,{{ imagem_b64 }}" download="ia-imagem.png">
                    <button class="btn-secondary">DOWNLOAD</button>
                </a>
                <!-- Botão Gerar Novamente (re-envia o formulário) -->
                <form action="/gerar" method="post" style="display:inline;">
                    <input type="hidden" name="descricao" value="{{ prompt }}">
                    <button type="submit">GERAR NOVAMENTE</button>
                </form>
            </div>
        {% endif %}
    </div>
</body>
</html>
